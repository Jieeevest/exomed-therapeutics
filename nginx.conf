server {
    listen 80;
    server_name _;

    # Root directory: folder dist hasil npm run build
    root /var/www/cryptoex;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Cache static assets aggressively (JS/CSS di-hash oleh Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Docs — serve sebagai static HTML, bukan di-handle React Router
    location /docs/ {
        try_files $uri $uri/ $uri.html =404;
    }

    # Semua route SPA → kembalikan ke index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api ke backend (opsional, jika FE dan BE di server yang sama)
    # Uncomment blok ini jika ingin akses API lewat domain yang sama
    # location /api/ {
    #     proxy_pass http://localhost:3001;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }
}
